# Build documentation GitHub Action
# This action uses docc to build the documentation
#
# Made by: Wesley de Groot 
# Email: email+gha@wesleydegroot.nl

name: 'Build documentation'
description: 'Build documentation using Swifts docc'
author: 'Wesley de Groot <email+gha@wesleydegroot.nl>'

inputs:
  branch:
    description: 'Branch to push to'
    required: false
    default: 'documentation'
  product:
    description: 'Product name for Swift packages, or scheme name for Xcode projects'
    required: false
    default: '__AUTO__'
  project:
    description: 'Path to an .xcodeproj file. Use __AUTO__ to detect one automatically.'
    required: false
    default: '__AUTO__'
  iOS:
    description: 'Build for iOS?'
    required: false
    default: false
  temppath:
    description: 'Temporarly file path'
    required: false
    default: 'tmpdocs'

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Create folder for generated documentation
      shell: bash
      run: |
        mkdir -p "${{ inputs.temppath }}"

    - name: Add docc plugin to Package.swift
      shell: bash
      run: |
        if [[ -f Package.swift ]]
        then
          if ! grep -q "swift-docc-plugin" Package.swift
          then
            echo "package.dependencies.append(" >> Package.swift
            echo "  .package(url: \"https://github.com/apple/swift-docc-plugin\", from: \"1.0.0\")" >> Package.swift
            echo ")" >> Package.swift
          fi
        else
          echo "No Package.swift found; skipping Swift-DocC plugin setup."
        fi

    - name: Build Documentation
      shell: bash
      run: |
        PROJECT_PATH=""

        if [[ "${{ inputs.project }}" != "__AUTO__" ]]
        then
          PROJECT_PATH="${{ inputs.project }}"
        else
          PROJECT_PATH="$(find . -maxdepth 2 -name "*.xcodeproj" -print -quit)"
        fi

        if [[ -n "$PROJECT_PATH" && ! -d "$PROJECT_PATH" ]]
        then
          echo "::error::Xcode project not found at $PROJECT_PATH"
          exit 1
        fi

        if [[ "${{ inputs.product }}" == "__AUTO__" ]]
        then
          if [[ -n "$PROJECT_PATH" ]]
          then
            PROJECT_LIST_JSON="$(mktemp)"
            xcodebuild -list -json -project "$PROJECT_PATH" > "$PROJECT_LIST_JSON"
            PRODUCT_NAME="$(python3 -c 'import json, sys; data = json.load(open(sys.argv[1], encoding="utf-8")); schemes = data.get("project", {}).get("schemes", []); sys.exit("No shared schemes found in the Xcode project.") if not schemes else print(schemes[0])' "$PROJECT_LIST_JSON")"
          elif [[ -f Package.swift ]]
          then
            # Automatically get package name
            PRODUCT_NAME=`cat Package.swift | grep -m1 "name" | awk -F'"' '{print $2}'`
          else
            echo "::error::No Package.swift or .xcodeproj found."
            exit 1
          fi
        else
          PRODUCT_NAME="${{ inputs.product }}"
        fi
        echo "DOCC_PRODUCT_NAME=$PRODUCT_NAME" >> "$GITHUB_ENV"
        echo "$PRODUCT_NAME"

        if [[ -n "$PROJECT_PATH" ]]
        then
          if [[ "${{ inputs.iOS }}" == "true" ]]
          then
            DESTINATION="generic/platform=iOS"
          else
            DESTINATION="generic/platform=macOS"
          fi

          xcodebuild docbuild -project "$PROJECT_PATH" \
          -scheme "$PRODUCT_NAME" \
          -destination "$DESTINATION" \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          OTHER_DOCC_FLAGS="--transform-for-static-hosting --hosting-base-path `basename ${{ github.repository }}` --output-path ${{ inputs.temppath }}"
        elif [[ "${{ inputs.iOS }}" == "true" ]]
        then
          xcodebuild docbuild -scheme "$PRODUCT_NAME" \
          -destination generic/platform=iOS \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          OTHER_DOCC_FLAGS="--transform-for-static-hosting --hosting-base-path `basename ${{ github.repository }}` --output-path ${{ inputs.temppath }}"
        else
          swift package --allow-writing-to-directory ${{ inputs.temppath }} \
          generate-documentation \
          --target "$PRODUCT_NAME" \
          --disable-indexing \
          --output-path ${{ inputs.temppath }} \
          --transform-for-static-hosting \
          --hosting-base-path `basename ${{ github.repository }}`
        fi

    - name: Init new repo in and add required files
      shell: bash
      run: |
        cd ${{ inputs.temppath }}
        git init -b "${{ inputs.branch }}"
        PRODUCT_NAME="$DOCC_PRODUCT_NAME"
        echo "{\"meta\":{\"title\":\"$PRODUCT_NAME Documentation\"}}" > theme-settings.json
        DOCURL=${PRODUCT_NAME//-/_}
        DOCURL=${DOCURL// /_}
        echo "<script>window.location.href = (document.location.host.indexOf('github.io') != -1 ? '/`basename ${{ github.repository }}`' : '') + '/documentation/$DOCURL/'.toLowerCase();</script>" > index.html
        cp index.html 404.html
        touch .nojekyll
        git add -A .
        git config user.name github-actions
        git config user.email github-actions@github.com
        git commit -m 'deploy'
        git push \
        "https://${{ github.repository_owner }}:${{ github.token }}@github.com/${{ github.repository }}.git" \
        HEAD:${{ inputs.branch }} \
        --force

branding:
  icon: "upload-cloud"
  color: "blue"
